name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pip-audit
      - run: python -m pip install -e .
      - run: pip-audit
      - name: Scan tracked source for secret-looking assignments
        run: |
          if git grep -nEi "(api[_-]?key|secret|token|password)[[:space:]]*[:=][[:space:]]*['\\\"]?[A-Za-z0-9_/-]{8,}" -- ':!.github/workflows/security.yml'; then
            echo "Secret-looking assignment detected."
            exit 1
          fi
