name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pip-audit
      - run: python -m pip install -e .
      - run: pip-audit
      - run: git grep -nEi '(api[_-]?key|secret|token|password)\s*[:=]\s*["'"'][^"'"']{8,}' -- ':!.github/workflows/security.yml' && exit 1 || exit 0
