name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: make verify
      - run: make package
      - run: gh release create "${GITHUB_REF_NAME}" dist-release/* --verify-tag --title "${GITHUB_REF_NAME}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
