name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e '.[dev]'
      - run: make verify
      - run: make demo
      - uses: actions/upload-artifact@v7
        with:
          name: reports-and-builds
          path: |
            demo-output/
            dist/
